<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>District Weather Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-body-tertiary">
<main class="container py-4">
    <section class="mb-4">
        <div class="dashboard-hero rounded-4">
            <div class="hero-overlay"></div>
            <div class="hero-content d-flex flex-column flex-lg-row align-items-start align-items-lg-center justify-content-between gap-4">
                <div>
                    <p class="eyebrow mb-2 text-white-50">Weather Operations</p>
                    <h1 class="display-6 mb-2 fw-semibold text-white">District Weather Command Center</h1>
                    <p class="mb-3 text-white-50">Nowcast, rainfall, and district warnings for Meghalaya.</p>
                    <nav class="dashboard-menu d-flex flex-wrap gap-2" id="map-plot-menu" role="tablist">
                        <button type="button" class="menu-pill menu-button plot-mode-btn active"
                                data-plot-mode="nowcast" aria-selected="true">Nowcast</button>
                        <button type="button" class="menu-pill menu-button plot-mode-btn"
                                data-plot-mode="rainfall" aria-selected="false">Rainfall</button>
                        <button type="button" class="menu-pill menu-button plot-mode-btn"
                                data-plot-mode="warning" aria-selected="false">Warning</button>
                    </nav>
                </div>
            </div>
        </div>
    </section>

    <section class="row g-4">
        <div class="col-12">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body py-3 px-3 px-md-4">
                    <div class="city-weather-section-header mb-2">
                        <h2 class="h6 mb-0 text-secondary text-uppercase small">Station weather</h2>
                        <span class="small text-muted">Select a station to open the 7-day forecast</span>
                    </div>
                    <div id="city-weather-accordion-root"
                         class="city-weather-strip d-flex flex-row flex-nowrap align-items-stretch gap-2 overflow-auto"
                         role="list">
                        <p class="small text-secondary py-2 mb-0">Loading city stations…</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div id="map-panel" class="card shadow-sm border-0 rounded-4 h-100 section-panel">
                <div class="card-body p-3 p-md-4">
                    <div class="mb-2">
                        <h2 class="h6 mb-0 text-secondary text-uppercase small" id="map-plot-title">Nowcast</h2>
                        <div id="nowcast-last-updated" class="nowcast-last-updated d-none" aria-live="polite"></div>
                    </div>
                    <div th:replace="~{fragments/district-map :: districtMap}"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm border-0 rounded-4 h-100">
                <div class="card-body">
                    <h2 class="h5 mb-3" id="district-detail-title">District details</h2>
                    <div id="district-detail-card" class="small text-secondary">
                        Hover over a district on the map to view details.
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/city-weather.js}"></script>
<script th:src="@{/js/map.js}"></script>
</body>
</html>
